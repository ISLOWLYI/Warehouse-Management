name: proektdeyat

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 5s
      retries: 15

  web:
    build: .
    command:
      - /bin/sh
      - -c
      - (bundle check || bundle install) && bin/rails db:prepare && rm -f tmp/pids/server.pid && exec bin/rails server -b 0.0.0.0 -p 3000
    volumes:
      - .:/app
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/app_development
      RAILS_ENV: development
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
